<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshGo - Coming Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#e8fff1,#d5ffe8,#b9ffd6);
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
    }

    /* BACKGROUND BLUR CIRCLES */

    .circle{
      position:absolute;
      border-radius:50%;
      filter:blur(70px);
      opacity:0.5;
    }

    .circle1{
      width:300px;
      height:300px;
      background:#31d67b;
      top:-80px;
      left:-80px;
    }

    .circle2{
      width:280px;
      height:280px;
      background:#10b35f;
      bottom:-80px;
      right:-60px;
    }

    /* CARD */

    .coming-box{
      width:90%;
      max-width:700px;
      background:rgba(255,255,255,0.35);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.4);
      border-radius:35px;
      padding:60px 40px;
      text-align:center;
      box-shadow:0 12px 35px rgba(0,0,0,0.1);
      position:relative;
      z-index:2;
    }

    .logo{
      font-size:30px;
      font-weight:700;
      color:#0b6b3a;
      margin-bottom:25px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-container img {
      width: 70px;
      height: 60px;
      object-fit: contain;
      padding-bottom: 23px;
    }

    .badge{
      display:inline-block;
      padding:10px 22px;
      border-radius:30px;
      background:rgba(255,255,255,0.6);
      color:#119d57;
      font-weight:600;
      margin-bottom:30px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    h1{
      font-size:64px;
      color:#0d3b24;
      margin-bottom:20px;
      line-height:1.1;
    }

    h1 span{
      color:#10b35f;
    }

    p{
      color:#557260;
      font-size:18px;
      line-height:1.9;
      max-width:580px;
      margin:auto;
      margin-bottom:40px;
    }

    .notify-btn{
      display:inline-block;
      text-decoration:none;
      background:linear-gradient(to right,#119d57,#31d67b);
      color:white;
      padding:16px 36px;
      border-radius:40px;
      font-weight:600;
      transition:0.3s;
      box-shadow:0 10px 25px rgba(17,157,87,0.3);
    }

    .notify-btn:hover{
      transform:translateY(-4px);
    }

    .footer{
      margin-top:40px;
      color:#5c7467;
      font-size:14px;
    }

    @media(max-width:768px){

      h1{
        font-size:44px;
      }

      p{
        font-size:16px;
      }

      .coming-box{
        padding:45px 25px;
      }

    }

  </style>
</head>

<body>

  <!-- BLUR BACKGROUND -->

  <div class="circle circle1"></div>
  <div class="circle circle2"></div>

  <!-- COMING SOON CARD -->

  <div class="coming-box">

    <div class="logo-container">
      <img src="logo.png" alt="FreshGo Logo">
      <div class="logo">FreshGo</div>
    </div>


    <div class="badge">
      🚀 New Feature Launching Soon
    </div>

    <h1>
      Something <span>Amazing</span><br>
      Is Coming Soon
    </h1>

    <p>
      We are building the next generation AI-powered freshness and expiry
      prediction platform for fruits, vegetables, and smart food inventory.
      Stay tuned for exciting updates.
    </p>

    <a href="dashboard.html" class="notify-btn">
      Back To Home
    </a>

    <div class="footer">
      © 2026 FreshGo | Made by #Error404
    </div>

  </div>

</body>
</html>
