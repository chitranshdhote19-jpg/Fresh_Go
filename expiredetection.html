<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreshGo - Expiry Predictor</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:linear-gradient(135deg,#e8fff1,#d5ffe8,#b9ffd6);
      min-height:100vh;
      color:#123524;
    }

    /* NAVBAR */

    nav{
      width:100%;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      backdrop-filter:blur(12px);
      background:rgba(255,255,255,0.18);
      position:sticky;
      top:0;
      border-bottom:1px solid rgba(255,255,255,0.25);
    }

    .logo{
      font-size:25px;
      font-weight:bold;
      margin-bottom:15px;
      color:#047857;
      align-items: center;
      padding-top: 18px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-container img {
      width: 70px;
      height: 60px;
      object-fit: contain;
    }

    .home-btn{
      text-decoration:none;
      padding:12px 26px;
      border-radius:30px;
      background:linear-gradient(to right,#119d57,#31d67b);
      color:white;
      font-weight:600;
      transition:0.3s;
      box-shadow:0 8px 18px rgba(17,157,87,0.3);
    }

    .home-btn:hover{
      transform:translateY(-3px);
    }

    /* MAIN SECTION */

    .container{
      width:100%;
      min-height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
    }

    .predictor-box{
      width:100%;
      max-width:520px;
      background:rgba(255,255,255,0.35);
      backdrop-filter:blur(16px);
      border-radius:32px;
      padding:40px;
      box-shadow:0 12px 30px rgba(0,0,0,0.1);
      border:1px solid rgba(255,255,255,0.4);
      text-align:center;
    }

    .predictor-box h1{
      font-size:38px;
      margin-bottom:15px;
      color:#0d3b24;
    }

    .predictor-box p{
      color:#557260;
      line-height:1.8;
      margin-bottom:30px;
    }

    .input-box{
      margin-bottom:22px;
      text-align:left;
    }

    .input-box label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
      color:#0f4f2f;
    }

    .input-box input,
    .input-box select{
      width:100%;
      padding:14px;
      border:none;
      border-radius:16px;
      outline:none;
      background:white;
      font-size:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    .predict-btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:18px;
      background:linear-gradient(to right,#119d57,#31d67b);
      color:white;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
      box-shadow:0 10px 20px rgba(17,157,87,0.3);
    }

    .predict-btn:hover{
      transform:translateY(-3px);
    }

    .result-box{
      margin-top:30px;
      padding:22px;
      border-radius:22px;
      background:white;
      display:none;
      box-shadow:0 6px 18px rgba(0,0,0,0.06);
    }

    .result-box h2{
      color:#119d57;
      margin-bottom:10px;
    }

    .result-box p{
      margin:8px 0;
      color:#486657;
      font-size:16px;
    }

    @media(max-width:600px){

      .predictor-box{
        padding:28px;
      }

      .predictor-box h1{
        font-size:30px;
      }

    }

  </style>
</head>

<body>

  <!-- NAVBAR -->

  <nav>

    <div class="logo-container">
      <img src="logo.png" alt="FreshGo Logo">
      <div class="logo">FreshGo</div>
    </div>


    <a href="dashboard.html" class="home-btn">
      Home
    </a>

  </nav>

  <!-- PREDICTOR -->

  <section class="container">

    <div class="predictor-box">

      <h1>Expiry Predictor</h1>

      <p>
        Predict food freshness and estimated expiry time instantly.
      </p>

      <div class="input-box">
        <label>Food Item</label>

        <select id="foodType">
          <option value="Milk">Milk</option>
          <option value="Bread">Bread</option>
          <option value="Apple">Apple</option>
          <option value="Banana">Banana</option>
          <option value="Vegetables">Vegetables</option>
        </select>
      </div>

      <div class="input-box">
        <label>Storage Temperature (°C)</label>

        <input type="number" id="temperature" placeholder="Enter temperature">
      </div>

      <div class="input-box">
        <label>Days Since Purchase</label>

        <input type="number" id="days" placeholder="Enter days">
      </div>

      <button class="predict-btn" onclick="predictExpiry()">
        Predict Expiry
      </button>

      <!-- RESULT -->

      <div class="result-box" id="resultBox">

        <h2>Prediction Result</h2>

        <p id="freshness"></p>

        <p id="expiry"></p>

      </div>

    </div>

  </section>

  <script>

    function predictExpiry(){

      const food = document.getElementById("foodType").value;
      const temp = parseInt(document.getElementById("temperature").value);
      const days = parseInt(document.getElementById("days").value);

      const resultBox = document.getElementById("resultBox");
      const freshness = document.getElementById("freshness");
      const expiry = document.getElementById("expiry");

      if(isNaN(temp) || isNaN(days)){

        alert("Please fill all fields.");
        return;
      }

      let maxDays = 0;

      switch(food){

        case "Milk":
          maxDays = 7;
          break;

        case "Bread":
          maxDays = 5;
          break;

        case "Apple":
          maxDays = 14;
          break;

        case "Banana":
          maxDays = 6;
          break;

        case "Vegetables":
          maxDays = 10;
          break;
      }

      // Temperature effect

      if(temp > 10){
        maxDays -= 2;
      }

      if(temp > 20){
        maxDays -= 3;
      }

      const remaining = maxDays - days;

      resultBox.style.display = "block";

      if(remaining > 5){

        freshness.innerHTML = "✅ Freshness Status: Fresh";
        expiry.innerHTML = "Estimated expiry in <b>" + remaining + " days</b>";

      }
      else if(remaining > 0){

        freshness.innerHTML = "⚠ Freshness Status: Consume Soon";
        expiry.innerHTML = "Estimated expiry in <b>" + remaining + " days</b>";

      }
      else{

        freshness.innerHTML = "❌ Freshness Status: Expired";
        expiry.innerHTML = "Food may no longer be safe to consume.";

      }

    }

  </script>

</body>
</html>
